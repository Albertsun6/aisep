# OpenHands 自托管（企业私有化执行层）—— 隔离 sandbox，code/secret 不出边界。
# 仅为参考骨架；以 OpenHands 官方镜像与版本为准（核心引擎不依赖本文件）。
services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:latest
    container_name: aiforge-openhands
    environment:
      # 模型走 AI Gateway / 自有推理，按需配置（宪法 P9 可替换）
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-sonnet-4-5}
      - LLM_API_KEY=${LLM_API_KEY}
      # 沙箱 runtime 镜像
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:latest
      - WORKSPACE_BASE=/opt/workspace
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/opt/workspace
    restart: unless-stopped
    # 资源上限，配合 blast-radius 与成本控制（避免调研中的资源过度供给/财务损失）
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
